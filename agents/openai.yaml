interface:
  display_name: "Resume Studio"
  short_description: "Score, diagnose, rewrite and export job-seeker resumes with STAR + ATS + JD gap analysis"
  default_prompt: "Use $resume-studio to score my resume, diagnose gaps against a target JD, rewrite with STAR, and export to PDF."
  system_prompt_ref: "../SKILL.md"
  model_hint:
    default: "gpt-4o-mini"
    reasoning: "gpt-4o"
capabilities:
  - resume_scoring
  - jd_gap_analysis
  - star_rewrite
  - ats_optimization
  - multi_format_export
  - interview_qa_prediction
  - employer_variant_routing
output_contract:
  variant_suffix: "<variant> ∈ {soe, internet, foreign}, confirmed at Step 0"
  required:
    - resume/resume-<variant>.md
    - resume/resume-diagnosis-<variant>.md
    - resume/resume-<variant>.html
    - resume/interview-qa-<variant>.md
  conditional:
    - resume/jd-analysis-<variant>.md
    - resume/resume-<variant>-one-page.md
  batch_mode: "user explicitly requests all three variants → three sets produced, one diagnosis + one interview-qa per variant, not merged"
references:
  - references/workflow.md
  - references/employer-variants.md
  - references/scoring-rubric.md
  - references/audit-checklist.md
  - references/star-rewrite.md
  - references/resume-variants.md
  - references/jd-analysis.md
  - references/red-flags.md
  - references/one-page-resume.md
  - references/interview-qa.md
  - references/export-templates.md
  - references/privacy-redaction.md
  - templates/soe.html
  - templates/internet.html
  - templates/foreign.html
  - references/resume-modules.md
